<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lolo Dialog Playground — Interactive Flow Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./prototype-dialog.html" media="none" onload="loadDialogStyles()">
<style>
  :root {
    --white: #ffffff;
    --canvas: #f6f5f2;
    --neutral-100: #f6f5f2;
    --neutral-200: #f0eee6;
    --text-primary: #3d3935;
    --text-secondary: #6b665f;
    --text-tertiary: #938d85;
    --borders-default: #f0eee6;
    --lavender-100: #f0ecfa;
    --lavender-200: #e0d9f4;
    --lavender-700: #7e6fca;
    --lavender-800: #6457a6;
    --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-6: 24px;
    --r-lg: 8px; --r-xl: 12px;
    --font: 'Plus Jakarta Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--canvas);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .toolbar {
    background: var(--white);
    border-bottom: 1px solid var(--borders-default);
    padding: var(--sp-3) var(--sp-4);
    display: flex;
    align-items: center;
    gap: var(--sp-4);
  }

  .toolbar h1 {
    font-size: 18px;
    font-weight: 600;
    flex: 1;
  }

  .toolbar select, .toolbar button {
    padding: 6px 12px;
    border: 1px solid var(--borders-default);
    border-radius: var(--r-lg);
    font-family: var(--font);
    font-size: 13px;
    background: var(--white);
    cursor: pointer;
  }

  .toolbar button {
    background: var(--lavender-700);
    color: white;
    border-color: var(--lavender-700);
    font-weight: 500;
  }

  .toolbar button:hover {
    background: var(--lavender-800);
  }

  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    overflow: hidden;
  }

  .editor-pane {
    background: #1e1e1e;
    display: flex;
    flex-direction: column;
  }

  .editor-header {
    padding: var(--sp-3) var(--sp-4);
    background: #2d2d2d;
    color: #cccccc;
    font-size: 12px;
    font-weight: 600;
    border-bottom: 1px solid #3e3e3e;
  }

  .editor {
    flex: 1;
    overflow: auto;
  }

  textarea {
    width: 100%;
    height: 100%;
    padding: var(--sp-4);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    background: #1e1e1e;
    color: #d4d4d4;
    border: none;
    resize: none;
    outline: none;
  }

  .preview-pane {
    background: var(--canvas);
    position: relative;
    overflow: hidden;
  }

  .error {
    position: absolute;
    top: var(--sp-4);
    left: var(--sp-4);
    right: var(--sp-4);
    padding: var(--sp-3);
    background: #ff5252;
    color: white;
    border-radius: var(--r-lg);
    font-size: 13px;
    z-index: 1000;
  }

  @media (max-width: 768px) {
    .main {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
    }
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>🎨 Playground</h1>
  <select id="templateSelect" onchange="loadTemplate()">
    <option value="">Select template...</option>
    <option value="simple">Simple Selection</option>
    <option value="detailed">Detailed Search</option>
    <option value="multi">Multi-Step Flow</option>
  </select>
  <button onclick="testFlow()">▶ Test Flow</button>
  <a href="./index.html" style="color: var(--text-secondary); text-decoration: none; font-size: 13px;">← Back</a>
</div>

<div class="main">
  <div class="editor-pane">
    <div class="editor-header">JSON Flow Definition</div>
    <div class="editor">
      <textarea id="jsonEditor" spellcheck="false">{
  "userMessage": "Create or upload a new document",
  "steps": [
    {
      "id": "upload-method",
      "type": "suggestions",
      "question": "How would you like to add this document?",
      "options": [
        {
          "label": "Upload from device",
          "value": "upload",
          "icon": "<path d=\\"M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4\\"/><polyline points=\\"17,8 12,3 7,8\\"/><line x1=\\"12\\" y1=\\"3\\" x2=\\"12\\" y2=\\"15\\"/>"
        },
        {
          "label": "Create new",
          "value": "create",
          "icon": "<line x1=\\"12\\" y1=\\"5\\" x2=\\"12\\" y2=\\"19\\"/><line x1=\\"5\\" y1=\\"12\\" x2=\\"19\\" y2=\\"12\\"/>"
        }
      ]
    },
    {
      "id": "confirm",
      "type": "canvas",
      "question": "Save to your vault?",
      "docTitle": "New Document",
      "docName": "Untitled Document",
      "actionLabel": "Save",
      "actionValue": "save"
    }
  ],
  "successMessage": "Document saved successfully"
}</textarea>
    </div>
  </div>

  <div class="preview-pane" id="previewPane">
    <iframe id="previewFrame" style="width: 100%; height: 100%; border: none;"></iframe>
  </div>
</div>

<script type="module">
import { DialogFlow, showUserMessage, setState } from './lib/dialog-engine.js';

// Templates
const templates = {
  simple: {
    userMessage: "Select an option",
    steps: [{
      id: "select",
      type: "suggestions",
      question: "What would you like to do?",
      options: [
        { label: "Option A", value: "a", icon: "<circle cx=\\"12\\" cy=\\"12\\" r=\\"10\\"/>" },
        { label: "Option B", value: "b", icon: "<rect x=\\"3\\" y=\\"3\\" width=\\"18\\" height=\\"18\\" rx=\\"2\\"/>" }
      ]
    }],
    successMessage: "Done!"
  },
  detailed: {
    userMessage: "Find Taylor Johnson",
    steps: [{
      id: "results",
      type: "results",
      question: "I found these documents",
      showInsights: true,
      results: [{
        id: "doc1",
        detailed: true,
        title: "Living Will, 2024",
        status: "archived",
        role: "Witness",
        details: "Taylor was listed as a witness",
        meta: "No longer current"
      }]
    }],
    successMessage: "Document selected"
  },
  multi: {
    userMessage: "Complete this task",
    steps: [
      {
        id: "step1",
        type: "suggestions",
        question: "First, choose a category",
        options: [
          { label: "Documents", value: "docs", icon: "<path d=\\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\\"/><polyline points=\\"14,2 14,8 20,8\\"/>" },
          { label: "Passwords", value: "pwd", icon: "<rect x=\\"3\\" y=\\"11\\" width=\\"18\\" height=\\"11\\" rx=\\"2\\"/><path d=\\"M7 11V7a5 5 0 0110 0v4\\"/>" }
        ]
      },
      {
        id: "step2",
        type: "results",
        question: "Select an item",
        results: [
          { id: "item1", quote: "<strong>Item 1</strong>", source: "Source A" },
          { id: "item2", quote: "<strong>Item 2</strong>", source: "Source B" }
        ]
      },
      {
        id: "confirm",
        type: "canvas",
        question: "Confirm?",
        docTitle: "Preview",
        docName: "Selected Item",
        actionLabel: "Confirm"
      }
    ],
    successMessage: "Task completed!"
  }
};

window.loadTemplate = function() {
  const select = document.getElementById('templateSelect');
  const template = templates[select.value];
  if (template) {
    document.getElementById('jsonEditor').value = JSON.stringify(template, null, 2);
  }
};

window.testFlow = function() {
  const jsonText = document.getElementById('jsonEditor').value;
  const errorDiv = document.getElementById('error');
  if (errorDiv) errorDiv.remove();

  try {
    const flowData = JSON.parse(jsonText);
    
    // Create preview HTML
    const previewHTML = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./prototype-dialog.html">
  <style>
    body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body>
  <div id="dialogContainer"></div>
  <script type="module">
    import { DialogFlow, showUserMessage } from './lib/dialog-engine.js';
    
    const flowData = ${JSON.stringify(flowData)};
    
    function triggerSuccess() {
      alert(flowData.successMessage || 'Success!');
    }
    
    window.triggerSuccess = triggerSuccess;
    window.activeFlow = new DialogFlow({
      steps: flowData.steps,
      onComplete: () => triggerSuccess()
    });
    
    if (flowData.userMessage) {
      showUserMessage(flowData.userMessage, () => {
        window.activeFlow.start();
      });
    } else {
      window.activeFlow.start();
    }
  <\/script>
</body>
</html>`;

    // Load into iframe
    const iframe = document.getElementById('previewFrame');
    iframe.srcdoc = previewHTML;
    
  } catch (e) {
    const errorDiv = document.createElement('div');
    errorDiv.id = 'error';
    errorDiv.className = 'error';
    errorDiv.textContent = 'JSON Error: ' + e.message;
    document.getElementById('previewPane').appendChild(errorDiv);
  }
};

// Auto-test on load
setTimeout(() => window.testFlow(), 500);
</script>

</body>
</html>
