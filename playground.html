<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lolo Dialog Playground</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --canvas: #f6f5f2;
    --neutral-100: #f6f5f2;
    --neutral-200: #f0eee6;
    --text-primary: #3d3935;
    --text-secondary: #6b665f;
    --borders-default: #f0eee6;
    --lavender-700: #7e6fca;
    --lavender-800: #6457a6;
    --sp-3: 12px; --sp-4: 16px;
    --r-lg: 8px;
    --font: 'Plus Jakarta Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--canvas);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .toolbar {
    background: var(--white);
    border-bottom: 1px solid var(--borders-default);
    padding: var(--sp-3) var(--sp-4);
    display: flex;
    align-items: center;
    gap: var(--sp-4);
  }

  .toolbar h1 {
    font-size: 18px;
    font-weight: 600;
    flex: 1;
  }

  .toolbar select, .toolbar button, .toolbar a {
    padding: 6px 12px;
    border: 1px solid var(--borders-default);
    border-radius: var(--r-lg);
    font-family: var(--font);
    font-size: 13px;
    background: var(--white);
    cursor: pointer;
    text-decoration: none;
    color: var(--text-secondary);
  }

  .toolbar button {
    background: var(--lavender-700);
    color: white;
    border-color: var(--lavender-700);
    font-weight: 500;
  }

  .toolbar button:hover {
    background: var(--lavender-800);
  }

  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    overflow: hidden;
  }

  .editor-pane {
    background: #1e1e1e;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #3e3e3e;
  }

  .editor-header {
    padding: var(--sp-3) var(--sp-4);
    background: #2d2d2d;
    color: #cccccc;
    font-size: 12px;
    font-weight: 600;
    border-bottom: 1px solid #3e3e3e;
  }

  textarea {
    flex: 1;
    padding: var(--sp-4);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    background: #1e1e1e;
    color: #d4d4d4;
    border: none;
    resize: none;
    outline: none;
  }

  .preview-pane {
    background: var(--canvas);
    position: relative;
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .error {
    position: absolute;
    top: var(--sp-4);
    left: var(--sp-4);
    right: var(--sp-4);
    padding: var(--sp-3);
    background: #ff5252;
    color: white;
    border-radius: var(--r-lg);
    font-size: 13px;
    z-index: 1000;
  }

  @media (max-width: 768px) {
    .main {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
    }
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>🎨 Playground</h1>
  <select id="templateSelect" onchange="loadTemplate()">
    <option value="">Select template...</option>
    <option value="simple">Simple Selection</option>
    <option value="detailed">Detailed Search</option>
    <option value="multi">Multi-Step Flow</option>
  </select>
  <button onclick="testFlow()">▶ Test Flow</button>
  <a href="./index.html">← Back</a>
</div>

<div class="main">
  <div class="editor-pane">
    <div class="editor-header">JSON Flow Definition</div>
    <textarea id="jsonEditor" spellcheck="false">{
  "userMessage": "Create or upload a new document",
  "steps": [
    {
      "id": "upload-method",
      "type": "suggestions",
      "question": "How would you like to add this document?",
      "options": [
        {
          "label": "Upload from device",
          "value": "upload",
          "icon": "<path d='M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4'/><polyline points='17,8 12,3 7,8'/><line x1='12' y1='3' x2='12' y2='15'/>"
        },
        {
          "label": "Create new",
          "value": "create",
          "icon": "<line x1='12' y1='5' x2='12' y2='19'/><line x1='5' y1='12' x2='19' y2='12'/>"
        }
      ]
    },
    {
      "id": "confirm",
      "type": "canvas",
      "question": "Save to your vault?",
      "docTitle": "New Document",
      "docName": "Untitled Document",
      "actionLabel": "Save",
      "actionValue": "save"
    }
  ],
  "successMessage": "Document saved successfully"
}</textarea>
  </div>

  <div class="preview-pane" id="previewPane">
    <iframe id="previewFrame" src="about:blank"></iframe>
  </div>
</div>

<script>
// Templates
const templates = {
  simple: {
    userMessage: "Select an option",
    steps: [{
      id: "select",
      type: "suggestions",
      question: "What would you like to do?",
      options: [
        { label: "Option A", value: "a", icon: "<circle cx='12' cy='12' r='10'/>" },
        { label: "Option B", value: "b", icon: "<rect x='3' y='3' width='18' height='18' rx='2'/>" }
      ]
    }],
    successMessage: "Done!"
  },
  detailed: {
    userMessage: "Find Taylor Johnson",
    steps: [{
      id: "results",
      type: "results",
      question: "I found these documents",
      showInsights: true,
      results: [{
        id: "doc1",
        detailed: true,
        title: "Living Will, 2024",
        status: "archived",
        role: "Witness",
        details: "Taylor was listed as a witness",
        meta: "No longer current"
      }]
    }],
    successMessage: "Document selected"
  },
  multi: {
    userMessage: "Complete this task",
    steps: [
      {
        id: "step1",
        type: "suggestions",
        question: "First, choose a category",
        options: [
          { label: "Documents", value: "docs", icon: "<path d='M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z'/><polyline points='14,2 14,8 20,8'/>" },
          { label: "Passwords", value: "pwd", icon: "<rect x='3' y='11' width='18' height='11' rx='2'/><path d='M7 11V7a5 5 0 0110 0v4'/>" }
        ]
      },
      {
        id: "step2",
        type: "results",
        question: "Select an item",
        results: [
          { id: "item1", quote: "<strong>Item 1</strong>", source: "Source A" },
          { id: "item2", quote: "<strong>Item 2</strong>", source: "Source B" }
        ]
      },
      {
        id: "confirm",
        type: "canvas",
        question: "Confirm?",
        docTitle: "Preview",
        docName: "Selected Item",
        actionLabel: "Confirm"
      }
    ],
    successMessage: "Task completed!"
  }
};

function loadTemplate() {
  const select = document.getElementById('templateSelect');
  const template = templates[select.value];
  if (template) {
    document.getElementById('jsonEditor').value = JSON.stringify(template, null, 2);
  }
}

function testFlow() {
  console.log('testFlow() called');
  const jsonText = document.getElementById('jsonEditor').value;
  const errorDiv = document.getElementById('error');
  if (errorDiv) errorDiv.remove();

  try {
    const flowData = JSON.parse(jsonText);
    console.log('Flow data parsed:', flowData);

    // Store flow data in localStorage for preview page to access
    localStorage.setItem('playgroundFlow', JSON.stringify(flowData));
    console.log('Stored in localStorage');

    // Load preview page
    const previewSrc = './_playground-preview.html?t=' + Date.now();
    console.log('Loading preview:', previewSrc);
    document.getElementById('previewFrame').src = previewSrc;

  } catch (e) {
    const errorDiv = document.createElement('div');
    errorDiv.id = 'error';
    errorDiv.className = 'error';
    errorDiv.textContent = 'JSON Error: ' + e.message;
    document.getElementById('previewPane').appendChild(errorDiv);
  }
}

// Auto-test on load
setTimeout(() => testFlow(), 500);
</script>

</body>
</html>
