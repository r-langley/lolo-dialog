<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Include all dialog styles from prototype-dialog.html */
  :root {
    --white: #ffffff;
    --canvas: #f6f5f2;
    --neutral-50: #ffffff;
    --neutral-100: #f6f5f2;
    --neutral-200: #f0eee6;
    --neutral-800: #3d3935;
    --text-primary: #3d3935;
    --text-secondary: #6b665f;
    --text-tertiary: #938d85;
    --borders-default: #f0eee6;
    --lavender-100: #f0ecfa;
    --lavender-200: #e0d9f4;
    --lavender-500: #a599d9;
    --lavender-700: #7e6fca;
    --lavender-800: #6457a6;
    --user-bubble: #4E7195;
    --user-bubble-dark: #3d5a76;
    --surfaces-default: #ffffff;
    --surfaces-canvas: #f6f5f2;
    --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-6: 24px; --sp-8: 32px;
    --r-sm: 4px; --r-md: 6px; --r-lg: 8px; --r-xl: 12px; --r-2xl: 16px; --r-full: 9999px;
    --shadow-xxs: 0px 1px 1px rgba(16,24,40,0.07), 1px 1px 2px rgba(0,0,0,0.04);
    --shadow-xl: 0px 12px 24px 4px rgba(16,24,40,0.07);
    --font: 'Plus Jakarta Sans', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: #faf8f5;
    min-height: 100vh;
    overflow: hidden;
    margin: 0;
  }

  .scene {
    position: fixed;
    inset: 0;
    background: var(--canvas);
    z-index: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene-content {
    text-align: center;
    color: var(--text-tertiary);
    font-size: 13px;
    opacity: 0.5;
  }

  .dialog {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    width: min(640px, calc(100vw - 32px));
    background: var(--white);
    border-radius: var(--r-2xl);
    box-shadow: var(--shadow-xl);
    overflow: hidden;
    z-index: 100;
    display: flex;
    flex-direction: column;
  }

  .dialog-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--sp-2) var(--sp-3);
    min-height: 52px;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    flex: 1;
    min-width: 0;
  }

  .logo {
    flex-shrink: 0;
    width: 20px;
    height: 21px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .header-text {
    font-size: 18px;
    font-weight: 400;
    letter-spacing: -0.2px;
    color: var(--neutral-800);
  }

  .header-text.thinking {
    background: linear-gradient(90deg,
      var(--lavender-500) 0%,
      var(--lavender-700) 25%,
      var(--lavender-500) 50%,
      var(--lavender-700) 75%,
      var(--lavender-500) 100%
    );
    background-size: 200% auto;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 2.5s linear infinite;
  }

  @keyframes shimmer {
    0%   { background-position: 200% center; }
    100% { background-position: -50% center; }
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: var(--sp-1);
  }

  .icon-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: var(--r-md);
    transition: background 0.15s ease;
    color: var(--text-secondary);
  }

  .icon-btn:hover { background: var(--neutral-100); color: var(--text-primary); }
  .icon-btn svg { width: 16px; height: 16px; }

  .suggestions-row {
    display: flex;
    gap: var(--sp-3);
    padding: var(--sp-1) var(--sp-3);
    flex-shrink: 0;
  }

  .suggestion-chip {
    flex: 1;
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    padding: var(--sp-2) var(--sp-3);
    border: 1px solid var(--borders-default);
    border-radius: var(--r-lg);
    cursor: pointer;
    transition: all 0.15s ease;
    overflow: hidden;
    min-width: 0;
  }

  .suggestion-chip:hover { background: var(--lavender-100); border-color: var(--lavender-200); }
  .suggestion-chip svg { width: 20px; height: 20px; flex-shrink: 0; color: var(--text-secondary); }
  .suggestion-chip span { font-size: 12px; font-weight: 400; line-height: 16px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .user-message {
    display: flex;
    justify-content: flex-end;
    padding: var(--sp-1) var(--sp-3);
    flex-shrink: 0;
  }

  .user-bubble {
    display: inline-block;
    background: var(--user-bubble);
    color: #ffffff;
    font-size: 13px;
    font-weight: 500;
    line-height: 20px;
    padding: 10px 16px;
    border-radius: 20px 20px 4px 20px;
    max-width: 85%;
    word-break: break-word;
    animation: slideUpBubble 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
  }

  @keyframes slideUpBubble {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .response-area {
    display: flex;
    flex-direction: column;
    gap: var(--sp-1);
    padding: var(--sp-2) var(--sp-3);
    overflow-y: auto;
    flex: 1;
  }

  .result-row {
    display: flex;
    align-items: center;
    gap: var(--sp-3);
    padding: var(--sp-3);
    border-radius: var(--r-lg);
    cursor: pointer;
    transition: background 0.12s ease;
  }

  .result-row:hover { background: var(--lavender-100); }
  .result-icon { width: 20px; height: 20px; flex-shrink: 0; color: var(--text-tertiary); }
  .result-content { flex: 1; display: flex; align-items: center; gap: var(--sp-3); min-width: 0; }
  .result-quote {
    font-size: 14px; color: var(--text-primary); line-height: 20px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .result-source { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }

  .result-row.detailed {
    align-items: flex-start;
    padding: var(--sp-3);
  }
  .result-row.detailed .result-content { flex-direction: column; align-items: flex-start; gap: 4px; }
  .result-header {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .result-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .result-badge {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .result-badge.current { background: #e8f5e9; color: #2e7d32; }
  .result-badge.archived { background: var(--neutral-200); color: var(--text-secondary); }
  .result-badge.role { background: var(--lavender-100); color: var(--lavender-700); }
  .result-details { font-size: 13px; color: var(--text-primary); line-height: 18px; }
  .result-meta { font-size: 12px; color: var(--text-tertiary); }

  .canvas-area {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--sp-4);
    flex: 1;
  }

  .doc-card {
    width: 100%;
    max-width: 400px;
    background: var(--white);
    border: 1px solid var(--borders-default);
    border-radius: var(--r-xl);
    overflow: hidden;
  }

  .doc-preview {
    background: var(--canvas);
    padding: var(--sp-4);
    border-bottom: 1px solid var(--borders-default);
  }

  .doc-preview-inner {
    background: var(--white);
    border-radius: var(--r-md);
    padding: var(--sp-4);
    min-height: 200px;
  }

  .doc-preview-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: var(--sp-3);
  }

  .doc-preview-line {
    height: 8px;
    background: var(--neutral-200);
    border-radius: 4px;
    margin-bottom: var(--sp-2);
  }

  .doc-info {
    padding: var(--sp-4);
    display: flex;
    flex-direction: column;
    gap: var(--sp-3);
  }

  .doc-title {
    font-size: 16px;
    font-weight: 400;
    line-height: 24px;
    color: var(--neutral-800);
  }

  .doc-action-btn {
    padding: 10px 16px;
    background: var(--lavender-700);
    color: var(--white);
    border: none;
    border-radius: var(--r-lg);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .doc-action-btn:hover { background: var(--lavender-800); }

  .input-bar {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    padding: var(--sp-2) var(--sp-3);
    flex-shrink: 0;
  }

  .input-field {
    flex: 1;
    padding: 9px 12px;
    border: 1px solid var(--borders-default);
    border-radius: var(--r-md);
    font-family: var(--font);
    font-size: 14px;
    background: var(--white);
    color: var(--text-primary);
  }

  .input-field::placeholder { color: var(--text-tertiary); }

  .send-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--lavender-700);
    border: none;
    border-radius: var(--r-md);
    cursor: pointer;
    transition: background 0.15s ease;
    color: var(--white);
  }

  .send-btn:hover { background: var(--lavender-800); }
  .send-btn:disabled { background: var(--neutral-200); color: var(--text-tertiary); cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; }

  .success-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .success-check {
    width: 22px;
    height: 22px;
    background: #4caf50;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .success-check svg { width: 12px; height: 12px; }

  .fade-in { animation: fadeIn 0.25s cubic-bezier(0.4, 0, 0.2, 1) both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  [data-section] { display: none; }
  [data-section].visible { display: flex; flex-direction: column; }
  .suggestions-row[data-section].visible,
  .action-suggestions[data-section].visible { display: flex; flex-direction: row; }
  .user-message[data-section].visible { display: flex; flex-direction: row; justify-content: flex-end; }
</style>
</head>

<script type="module">
import { DialogFlow } from './lib/dialog-engine.js';

// Get flow data from localStorage
const flowDataStr = localStorage.getItem('playgroundFlow');
if (!flowDataStr) {
  document.getElementById('headerText').textContent = 'No flow data';
  throw new Error('No flow data in localStorage');
}

const flowData = JSON.parse(flowDataStr);

// Success handler
function triggerSuccess() {
  const headerText = document.getElementById('headerText');
  headerText.style.display = 'none';
  
  let si = document.getElementById('successIndicator');
  if (!si) {
    si = document.createElement('div');
    si.id = 'successIndicator';
    si.className = 'success-indicator';
    si.innerHTML = `
      <div class="success-check">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="2,6 5,9 10,3"/>
        </svg>
      </div>
      <span style="font-size:18px;font-weight:500;letter-spacing:-0.4px;color:var(--text-primary);">${flowData.successMessage || 'Success!'}</span>
    `;
    headerText.parentNode.insertBefore(si, headerText.nextSibling);
  }
  si.style.display = 'flex';
}

window.triggerSuccess = triggerSuccess;

// Create flow
window.activeFlow = new DialogFlow({
  steps: flowData.steps,
  onComplete: () => triggerSuccess()
});

// Show user message if provided, then start
if (flowData.userMessage) {
  document.getElementById('userBubble').textContent = flowData.userMessage;
  document.querySelectorAll('[data-section]').forEach(el => el.classList.remove('visible'));
  document.querySelector('[data-section="user-message"]').classList.add('visible');
  
  document.getElementById('headerText').textContent = 'Thinking...';
  document.getElementById('headerText').className = 'header-text thinking';
  
  setTimeout(() => {
    window.activeFlow.start();
  }, 2400);
} else {
  window.activeFlow.start();
}
</script>

</body>
</html>
